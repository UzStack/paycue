name: Build Go App

on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build binaries
        run: |
          # Server (paycue) — faqat linux (go-sqlite3 CGO; darwin cross-build qilinmaydi).
          for arch in amd64 arm64; do
            GOOS=linux GOARCH=$arch go build -o bin/paycue-linux-$arch ./cmd/paycue
          done
          # CLI (paycue-cli) — toza Go, linux va macOS uchun cross-compile.
          for os in linux darwin; do
            for arch in amd64 arm64; do
              GOOS=$os GOARCH=$arch go build -o bin/paycue-cli-$os-$arch ./cmd/paycue-cli
            done
          done

      - name: Build web UI
        working-directory: web
        run: |
          npm ci
          # Bo'sh VITE_API_URL -> nisbiy (same-origin) so'rovlar (server statik xizmat qiladi).
          VITE_API_URL="" npm run build
          tar -czf ../bin/paycue-web.tar.gz -C dist .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
